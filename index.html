<!DOCTYPE html>
<html>
<head>
<title>Мини-игра</title>

<style>
body {
    background: linear-gradient(135deg, #1e1e2f, #2a2a4a);
    color: white;
    font-family: Arial;
    text-align: center;
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

textarea {
    display: block;
    margin: 5px auto;
}

#notes {
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 10px;
}

canvas {
    background: black;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>🎮 Угадай число</h1>

<input type="number" id="guess">
<button onclick="check()">Проверить</button><br>
<button onclick="restart()">🔄 Заново</button><br>

<button id="secretBtn" onclick="toggleNotes()" style="display:none;">🔐 Заметки</button>
<button id="secretGameBtn" onclick="openMiniGame()" style="display:none;">🎮 Мини-игра</button>

<div id="notes" style="display:none;">
<input type="password" id="passwordInput" placeholder="Пароль">
<button onclick="checkPassword()">ОК</button>

<div id="notesContent" style="display:none;">
<div id="notesList"></div>
<button onclick="addNote()">➕</button>
</div>
</div>

<p id="result"></p>
<p id="lives">❤️ Жизни: 3</p>
<p id="score">🏆 Победы: 0</p>
<p id="best">🥇 Рекорд: 0</p>
<p id="loseBest">💀 Поражения: 0</p>
<p id="winrate">📊 0%</p>

<canvas id="gameCanvas" width="400" height="400" style="display:none;"></canvas>

<script>

// элементы
let result = document.getElementById("result");
let livesEl = document.getElementById("lives");
let scoreEl = document.getElementById("score");
let bestEl = document.getElementById("best");
let loseBestEl = document.getElementById("loseBest");
let winrateEl = document.getElementById("winrate");
let guess = document.getElementById("guess");
let secretBtn = document.getElementById("secretBtn");
let secretGameBtn = document.getElementById("secretGameBtn");
let notes = document.getElementById("notes");
let notesContent = document.getElementById("notesContent");
let passwordInput = document.getElementById("passwordInput");
let notesList = document.getElementById("notesList");

// игра
let secret = Math.floor(Math.random()*12)+1;
let lives = 3;
let score = 0;
let lastInputs = [];

let best = Number(localStorage.getItem("bestScore")) || 0;
let loseCount = Number(localStorage.getItem("loseScore")) || 0;

bestEl.innerHTML = "🥇 Рекорд: " + best;
loseBestEl.innerHTML = "💀 Поражения: " + loseCount;

function check(){
    let user = Number(guess.value);

    lastInputs.push(user);
    if(lastInputs.length>2) lastInputs.shift();

    if(lastInputs[0]==69 && lastInputs[1]==65){
        secretGameBtn.style.display="inline-block";
    }

    if(user==65){
        secretBtn.style.display="inline-block";
    }

    if(lives<=0) return;

    if(user==secret){
        score++;
        scoreEl.innerHTML="🏆 Победы: "+score;

        if(score>best){
            best=score;
            localStorage.setItem("bestScore",best);
            bestEl.innerHTML="🥇 Рекорд: "+best;
        }

        result.innerHTML="🎉 Угадал!";
        updateWinrate();

    } else {
        lives--;
        livesEl.innerHTML="❤️ Жизни: "+lives;
if (lives <= 0) {
    loseCount++;
    localStorage.setItem("loseScore", loseCount);
    loseBestEl.innerHTML = "💀 Поражения: " + loseCount;

    result.innerHTML = "💀 Ты проиграл! Было число " + secret;
    updateWinrate();
} else {
    if (user < secret) {
        result.innerHTML = "⬆️ Загаданное число больше!";
    } else {
        result.innerHTML = "⬇️ Загаданное число меньше!";
          }
    }
}
}

function restart(){
    secret=Math.floor(Math.random()*12)+1;
    lives=3;
    result.innerHTML="";
    livesEl.innerHTML="❤️ Жизни: 3";
    guess.value="";
}

function updateWinrate(){
    let total=score+loseCount;
    winrateEl.innerHTML="📊 "+(total?Math.floor(score/total*100):0)+"%";
}

// пароль
function checkPassword(){
    if(passwordInput.value=="123"){
        notesContent.style.display="block";
    }
}

function toggleNotes(){
    notes.style.display = notes.style.display=="none"?"block":"none";
}

// заметки
let saved = JSON.parse(localStorage.getItem("notes")||"[]");

function addNote(text=""){
    let div=document.createElement("div");

    let t=document.createElement("textarea");
    t.value=text;

    let del=document.createElement("button");
    del.innerHTML="❌";
    del.onclick=()=>{div.remove();saveNotes();};

    let pin=document.createElement("button");
    pin.innerHTML="📌";
    pin.onclick=()=>{notesList.prepend(div);saveNotes();};

    t.oninput=saveNotes;

    div.appendChild(t);
    div.appendChild(pin);
    div.appendChild(del);
    notesList.appendChild(div);
}

function saveNotes(){
    let data=[];
    document.querySelectorAll("#notesList textarea").forEach(t=>{
        data.push(t.value);
    });
    localStorage.setItem("notes",JSON.stringify(data));
}

saved.forEach(n=>addNote(n));

// мини игра (шары убегают от мышки)
function openMiniGame(){
    let canvas=document.getElementById("gameCanvas");
    canvas.style.display="block";
    let ctx=canvas.getContext("2d");

    let mouse={x:200,y:200};

    canvas.onmousemove = e=>{
        let r=canvas.getBoundingClientRect();
        mouse.x=e.clientX-r.left;
        mouse.y=e.clientY-r.top;
    };

    let balls=[];
    for(let i=0;i<5;i++){
        balls.push({
            x:Math.random()*400,
            y:Math.random()*400,
            dx:0,
            dy:0,
            r:15
        });
    }

    function update(){
        ctx.clearRect(0,0,400,400);

        balls.forEach(b=>{
            let dx=b.x-mouse.x;
            let dy=b.y-mouse.y;
            let dist=Math.sqrt(dx*dx+dy*dy)||1;

            if(dist<150){
                b.dx+=(dx/dist)*0.5;
                b.dy+=(dy/dist)*0.5;
            }

            b.x+=b.dx;
            b.y+=b.dy;

            if(b.x<0||b.x>400)b.dx*=-1;
            if(b.y<0||b.y>400)b.dy*=-1;

            ctx.beginPath();
            ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
            ctx.fillStyle="cyan";
            ctx.fill();
        });

        requestAnimationFrame(update);
    }

    update();
}

</script>

</body>
</html>
