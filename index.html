<!DOCTYPE html>
<html>
<head>
    <title>Мини-игра</title>

    <style>
    body {
        background: linear-gradient(135deg, #1e1e2f, #2a2a4a);
        color: white;
        font-family: Arial;
        text-align: center;
        margin-top: 50px;
    }

    h1 {
        font-size: 40px;
        text-shadow: 0 0 10px #4dd0e1;
    }

    input {
        padding: 12px;
        font-size: 18px;
        width: 120px;
        border-radius: 10px;
        border: none;
        text-align: center;
    }

    button {
        padding: 12px 25px;
        font-size: 18px;
        margin: 8px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(45deg, #4dd0e1, #26c6da);
        cursor: pointer;
    }

    button:hover {
        transform: scale(1.1);
    }

    textarea {
        display: block;
        margin: 5px auto;
        border-radius: 10px;
        padding: 8px;
    }

    #notes {
        background: rgba(0,0,0,0.3);
        padding: 15px;
        border-radius: 15px;
        margin-top: 15px;
    }

    #flashEffect {
        position: fixed;
        width: 100%;
        height: 100%;
        background: yellow;
        opacity: 0;
        pointer-events: none;
    }

    .flash-active {
        animation: flash 0.5s;
    }

    @keyframes flash {
        0% {opacity:0;}
        50% {opacity:0.8;}
        100% {opacity:0;}
    }
    </style>
</head>

<body>

<div id="flashEffect"></div>

<h1>🎮 Угадай число</h1>
<p>Я загадал число от 1 до 12</p>

<input type="number" id="guess">
<button onclick="check()">Проверить</button><br>
<button onclick="restart()">🔄 Играть заново</button><br>

<button id="secretBtn" onclick="toggleNotes()" style="display:none;">🔐 Заметки</button>
<button id="secretGameBtn" onclick="openMiniGame()" style="display:none;">🎮 Секретная игра</button>

<div id="notes" style="display:none;">
    <input type="password" id="passwordInput" placeholder="Пароль">
    <button onclick="checkPassword()">ОК</button>

    <div id="notesContent" style="display:none;">
        <div id="notesList"></div>
        <button onclick="addNote()">➕ Добавить</button>
    </div>
</div>

<p id="result"></p>
<p id="lives">❤️ Жизни: 3</p>
<p id="score">🏆 Победы: 0</p>
<p id="best">🥇 Рекорд: 0</p>
<p id="loseBest">💀 Поражения: 0</p>
<p id="winrate">📊 0%</p>

<canvas id="gameCanvas" width="400" height="400" style="display:none; background:black;"></canvas>

<script>
let secret = Math.floor(Math.random()*12)+1;
let lives = 3;
let score = 0;
let lastInputs = [];

let best = localStorage.getItem("bestScore") || 0;
let lose = localStorage.getItem("loseScore") || 0;

document.getElementById("best").innerHTML = "🥇 Рекорд: " + best;
document.getElementById("loseBest").innerHTML = "💀 Поражения: " + lose;

function check(){
    let user = Number(guess.value);

    lastInputs.push(user);
    if(lastInputs.length>2) lastInputs.shift();

    if(lastInputs[0]==69 && lastInputs[1]==65){
        secretGameBtn.style.display="inline-block";
    }

    if(user==65){
        secretBtn.style.display="inline-block";
    }

    if(lives<=0) return;

    if(user==secret){
        score++;
        scoreEl.innerHTML="🏆 Победы: "+score;

        if(score>best){
            best=score;
            localStorage.setItem("bestScore",best);
            bestEl.innerHTML="🥇 Рекорд: "+best;
        }

        result.innerHTML="🎉 Угадал!";
        flashEffect.classList.add("flash-active");
        setTimeout(()=>flashEffect.classList.remove("flash-active"),500);

        updateWinrate();
    } else {
        lives--;
        livesEl.innerHTML="❤️ Жизни: "+lives;

        if(lives<=0){
            lose++;
            localStorage.setItem("loseScore",lose);
            loseBest.innerHTML="💀 Поражения: "+lose;
            result.innerHTML="💀 Проиграл ("+secret+")";
            updateWinrate();
        } else {
            result.innerHTML = user<secret ? "⬆️ Больше" : "⬇️ Меньше";
        }
    }
}

function restart(){
    secret=Math.floor(Math.random()*12)+1;
    lives=3;
    result.innerHTML="";
    livesEl.innerHTML="❤️ Жизни: 3";
    guess.value="";
}

function updateWinrate(){
    let total=score+lose;
    winrate.innerHTML="📊 "+(total?Math.floor(score/total*100):0)+"%";
}

// пароль
function checkPassword(){
    if(passwordInput.value=="123"){
        notesContent.style.display="block";
    }
}

function toggleNotes(){
    notes.style.display = notes.style.display=="none"?"block":"none";
}

// заметки
let saved = JSON.parse(localStorage.getItem("notes")||"[]");

function addNote(text=""){
    let div=document.createElement("div");

    let t=document.createElement("textarea");
    t.value=text;

    let del=document.createElement("button");
    del.innerHTML="❌";
    del.onclick=()=>{div.remove();saveNotes();};

    let pin=document.createElement("button");
    pin.innerHTML="📌";
    pin.onclick=()=>{notesList.prepend(div);saveNotes();};

    t.oninput=saveNotes;

    div.appendChild(t);
    div.appendChild(pin);
    div.appendChild(del);
    notesList.appendChild(div);
}

function saveNotes(){
    let data=[];
    document.querySelectorAll("#notesList textarea").forEach(t=>{
        data.push(t.value);
    });
    localStorage.setItem("notes",JSON.stringify(data));
}

saved.forEach(n=>addNote(n));

// мини игра
function openMiniGame(){
    gameCanvas.style.display="block";
    startGame();
}

function startGame(){
    let c=gameCanvas;
    let ctx=c.getContext("2d");

    let balls=[];

    for(let i=0;i<4;i++){
        balls.push({
            x:Math.random()*300+50,
            y:Math.random()*300+50,
            dx:Math.random()*2-1,
            dy:Math.random()*2-1,
            r:15
        });
    }

    function update(){
        ctx.clearRect(0,0,400,400);

        balls.forEach((b,i)=>{
            let t=balls[(i+1)%balls.length];

            let dx=t.x-b.x;
            let dy=t.y-b.y;
            let d=Math.sqrt(dx*dx+dy*dy)||1;

            b.dx+=dx/d*0.05;
            b.dy+=dy/d*0.05;

            b.x+=b.dx;
            b.y+=b.dy;

            if(b.x<15||b.x>385) b.dx*=-1;
            if(b.y<15||b.y>385) b.dy*=-1;
        });

        for(let i=0;i<balls.length;i++){
            for(let j=i+1;j<balls.length;j++){
                let dx=balls[j].x-balls[i].x;
                let dy=balls[j].y-balls[i].y;
                let d=Math.sqrt(dx*dx+dy*dy)||1;

                if(d<30){
                    balls[i].dx*=-1;
                    balls[j].dx*=-1;
                }
            }
        }

        balls.forEach(b=>{
            ctx.beginPath();
            ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
            ctx.fillStyle="cyan";
            ctx.fill();
        });

        requestAnimationFrame(update);
    }

    update();
}
</script>

</body>
</html>
